<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Кнопка запуска (стандарт 2026 года для доступа к камере) */
      #example-scanning-overlay { display: flex; align-items: center; justify-content: center; position: absolute; left: 0; right: 0; top: 0; bottom: 0; background: rgba(0,0,0,0.5); color: white; z-index: 99; font-family: sans-serif; }
      #example-scanning-overlay.hidden { display: none; }
    </style>
  </head>

  <body>
    <div id="example-scanning-overlay">
      <p>Нажми, чтобы запустить магию Muffi Lafée...</p>
    </div>

    <div id="attribution">
        "cute fairy doll" by <a href="https://sketchfab.com/nevtaan" target="_blank">nevtaan</a> / <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY</a>
    </div>

    <a-scene mindar-image="imageTargetSrc: ./targets.mind; uiScanning: #example-scanning-overlay;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="fairyModel" src="./fairy_model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-gltf-model 
          src="#fairyModel" 
          rotation="0 0 0" 
          position="0 0 0.1" 
          scale="0.1 0.1 0.1"
          
          /* Анимация плавного парения вверх-вниз */
          animation="property: position; to: 0 0.1 0.1; dur: 2000; easing: easeInOutQuad; dir: alternate; loop: true"
          
          /* Анимация медленного вращения вокруг своей оси */
          animation__rotate="property: rotation; to: 0 360 0; dur: 10000; easing: linear; loop: true">
        </a-gltf-model>

      </a-entity>
    </a-scene>

    <script>
      // Убираем оверлей при старте
      document.querySelector('a-scene').addEventListener('targetFound', event => {
        document.querySelector('#example-scanning-overlay').classList.add('hidden');
      });
    </script>
  </body>
</html>
