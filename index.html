<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      #start-screen {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        position: absolute; inset: 0; background: #fff5f5; z-index: 99; font-family: sans-serif;
      }
      #start-button { padding: 20px 40px; font-size: 20px; background: #e1bee7; border-radius: 30px; border: none; cursor: pointer; }
      .hidden { display: none !important; }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <button id="start-button">ЗАПУСТИТЬ МАГИЮ ✨</button>
    </div>

    <div id="attribution">
        "cute fairy doll" by <a href="https://sketchfab.com/nevtaan" target="_blank">nevtaan</a> / <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank">CC BY</a>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0005; filterBeta: 0.005; missTolerance: 30; warmupTolerance: 5;"
      color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights" vr-mode-ui="enabled: false" device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="fairyModel" src="./fairy_model.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          src="#fairyModel" 
          position="0 0 0.2" 
          scale="0.6 0.6 0.6" 
          /* Оставляем только мягкое парение, чтобы не мешать осмотру */
          animation="property: position; to: 0 0.1 0.2; dur: 2000; easing: easeInOutQuad; dir: alternate; loop: true">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const btn = document.querySelector('#start-button');
      const screen = document.querySelector('#start-screen');
      btn.addEventListener('click', () => {
        screen.classList.add('hidden');
        // Принудительный старт видео (иногда помогает на iPhone)
        document.querySelector('video').play();
      });
    </script>
  </body>
</html>
